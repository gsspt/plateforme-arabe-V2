services:
  - type: web
    name: plateforme-arabe-v2
    env: python
    plan: free
    buildCommand: |
        sudo apt-get update
        sudo apt-get install -y poppler-utils  # ← CRUCIAL pour pdf2image
        pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
