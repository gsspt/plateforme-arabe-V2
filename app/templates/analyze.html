{% extends "base.html" %}

{% block title %}Analyseur Morphologique Arabe - V2{% endblock %}

{% block content %}
<div class="analyzer-layout">

    <!-- Barre de recherche compacte -->
    <div class="analyzer-search-bar">
        <div class="autocomplete-wrapper">
            <input type="text" id="arabic-input" placeholder="أدخل كلمة…" dir="rtl" autocomplete="off">
            <button id="analyze-btn" class="btn btn-primary">
                <span class="btn-text">Analyser</span>
                <div class="btn-spinner hidden"></div>
            </button>
            <ul id="autocomplete-dropdown" class="autocomplete-dropdown hidden" dir="rtl" role="listbox"></ul>
        </div>
        <button id="clear-btn" class="btn btn-ghost hidden">✕</button>
        <button id="favorite-btn" class="btn btn-ghost hidden" title="Ajouter aux favoris">☆</button>
    </div>

    <!-- Zone principale -->
    <div class="analyzer-main">
        <div id="loading" class="loading hidden"></div>

        <div id="error" class="error hidden"></div>

        <div id="results" class="results hidden"></div>

        <div class="analyzer-info">
            <div class="info-grid">
                <div class="info-item"><strong>Base:</strong> Buckwalter Transliteration Lexicon</div>
                <div class="info-item"><strong>Analyses:</strong> <span id="db-stats">—</span></div>
                <div class="info-item"><strong>Support:</strong> Verbes · Noms · Adjectifs · Fonctionnels</div>
            </div>
        </div>
    </div>

</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/analyzer.js') }}"></script>
<script>
fetch('/api/stats')
    .then(r => r.json())
    .then(data => {
        if (data.success && data.usage_stats) {
            const s = data.usage_stats.find(s => s.endpoint === 'analyze');
            document.getElementById('db-stats').textContent = s ? `${s.total_count} analyses` : 'Prêt';
        }
    });
</script>
{% endblock %}
